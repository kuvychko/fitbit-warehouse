# fitbit-warehouse infrastructure
#
# Two modes (see README):
#   Standalone : bundled TimescaleDB —  docker compose --profile standalone up -d
#   Shared     : set PG_HOST in .env to your own TimescaleDB host and do NOT
#                enable the standalone profile (no db container is created).
#
# Migrations (either mode):  docker compose run --rm migrate
#
# NOTE: in standalone mode the migrate service reaches the bundled db on the
# compose network at db:5432; PG_PORT only remaps the *host* port.

name: fitbit-warehouse

services:
  db:
    # HA community tag (not -oss: keeps compression + timescaledb_toolkit;
    # not -all: single PG major, smaller image). Same pin as the homelab
    # platform's warehouse-db, so standalone and shared modes match.
    # BREAKING (2026-07): moved off the Alpine timescaledb image, which never
    # shipped timescaledb_toolkit. musl->glibc means an existing db-data
    # volume from the old image cannot be reused — start a fresh volume and
    # re-run migrations/backfill (both idempotent).
    image: timescale/timescaledb-ha:pg17.10-ts2.28.2
    profiles: ["standalone"]
    environment:
      POSTGRES_DB: ${PG_DB:-warehouse}
      POSTGRES_PASSWORD: ${POSTGRES_SUPER_PW:-}
    volumes:
      # HA image (Spilo-derived) keeps PGDATA at /home/postgres/pgdata/data;
      # mount the parent dir, not /var/lib/postgresql/data. New volume name
      # (not db-data): the old Alpine-image volume's files sit at a
      # different layout and must not be reused (see BREAKING note above);
      # a distinct name also leaves the old volume untouched as an automatic
      # rollback point until it's manually removed post-cutover.
      - db-data-ts2:/home/postgres/pgdata
    ports:
      - "${PG_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ${PG_DB:-warehouse}"]
      interval: 5s
      timeout: 3s
      retries: 24
    restart: unless-stopped

  # One-shot migration runner; applies infra/migrations/*.sql in order.
  # Every migration is idempotent, so the runner just applies all of them
  # on every invocation — there is no version table to get out of sync.
  migrate:
    # Same pin as db (client tools must match); see db's comment above.
    image: timescale/timescaledb-ha:pg17.10-ts2.28.2
    profiles: ["migrate"]
    environment:
      PG_HOST: ${PG_HOST:-db}
      PG_PORT: ${PG_MIGRATE_PORT:-5432}
      PG_DB: ${PG_DB:-warehouse}
      # Contract naming (warehouse-cluster-contract §6): admin creds for the
      # runner; default to the bundled DB's superuser in standalone mode.
      PG_MIGRATE_USER: ${PG_MIGRATE_USER:-postgres}
      PGPASSWORD: ${PG_MIGRATE_PASSWORD:-${POSTGRES_SUPER_PW:-}}
      HEALTH_OWNER_PW: ${HEALTH_OWNER_PW:-}
      HEALTH_RW_PW: ${HEALTH_RW_PW:-}
      HEALTH_RO_PW: ${HEALTH_RO_PW:-}
    volumes:
      - ./migrations:/migrations:ro
    entrypoint: ["/bin/sh", "/migrations/run.sh"]
    restart: "no"

  # Google Health API poller. Opt-in profile: needs a one-time interactive
  # OAuth (python -m sync.authorize) to create secrets/google_token.json first.
  #   docker compose --profile sync up -d --build sync
  sync:
    build:
      context: ..
      dockerfile: infra/sync.Dockerfile
    profiles: ["sync"]
    environment:
      PG_HOST: ${PG_HOST:-db}
      PG_PORT: ${PG_PORT:-5432}
      PG_DB: ${PG_DB:-warehouse}
      HEALTH_RW_PW: ${HEALTH_RW_PW:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_TOKEN_PATH: /secrets/google_token.json
      POLL_INTERVAL: ${POLL_INTERVAL:-7200}
      OVERLAP_HOURS: ${OVERLAP_HOURS:-24}
      CATCHUP_CAP_DAYS: ${CATCHUP_CAP_DAYS:-30}
      HEALTHCHECKS_PING_URL: ${HEALTHCHECKS_PING_URL:-}
    volumes:
      - ../secrets:/secrets:ro
    restart: unless-stopped

  # Bundled Grafana for standalone mode. Shared-cluster users typically point
  # an existing Grafana at the same provisioning files instead.
  grafana:
    image: grafana/grafana:11.4.0
    profiles: ["standalone"]
    environment:
      PG_HOST: ${PG_HOST:-db}
      PG_PORT: "5432"
      PG_DB: ${PG_DB:-warehouse}
      HEALTH_RO_PW: ${HEALTH_RO_PW:-}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PW:-admin}
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards-health:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    restart: unless-stopped

volumes:
  db-data-ts2:
  grafana-data:
