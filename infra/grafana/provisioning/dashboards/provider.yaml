apiVersion: 1

providers:
  - name: fitbit-warehouse
    folder: Health
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      # distinct path so this provider can coexist with another tenant's
      # provider in a shared Grafana (e.g. the Pi instance)
      path: /var/lib/grafana/dashboards-health
